openapi: "3.0.3"
info:
  title: Minimal API
  version: "1.0.0"
paths:
  /api/hello:
    get:
      operationId: sayHello
      summary: Say hello
      description: Returns a simple greeting.
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
