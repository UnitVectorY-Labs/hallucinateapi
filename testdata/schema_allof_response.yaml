openapi: "3.0.3"
info:
  title: AllOf Response API
  version: "1.0.0"
  description: A spec with allOf in the response schema which is not supported
paths:
  /api/merged:
    get:
      operationId: getMerged
      summary: Get merged object
      description: Returns a merged object using allOf.
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                allOf:
                  - type: object
                    properties:
                      id:
                        type: string
                  - type: object
                    properties:
                      name:
                        type: string
